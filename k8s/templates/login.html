<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if register %}Register{% else %}Login{% endif %} - box5</title>
    <link rel="stylesheet" href="/static/box5.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: system-ui, sans-serif;
        }
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
        }
        h1 {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        input {
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1rem;
        }
        button {
            padding: 0.75rem;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
        .switch {
            text-align: center;
            margin-top: 1rem;
        }
        .error {
            color: red;
            text-align: center;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>{% if register %}Register{% else %}Login{% endif %} - box5</h1>
        <form method="post" action="{% if register %}/register{% else %}/login{% endif %}">
            {% if register %}
            <input type="email" name="email" placeholder="Email (optional)">
            {% endif %}
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">{% if register %}Register{% else %}Login{% endif %}</button>
        </form>
        <div class="switch">
            {% if register %}
            Already have an account? <a href="/login">Login</a>
            {% else %}
            <a href="/forgot-password">Forgot password?</a><br>
            Don't have an account? <a href="/register">Register</a>
            {% endif %}
        </div>
    </div>
</body>
</html>
