<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - box5</title>
    <style>
        body { font-family: system-ui; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { width: 100%; max-width: 400px; padding: 2rem; }
        h1 { text-align: center; }
        form { display: flex; flex-direction: column; gap: 1rem; }
        input { padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px; font-size: 1rem; }
        button { padding: 0.75rem; background: #007bff; color: white; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; }
        .success { color: green; text-align: center; }
        .error { color: red; text-align: center; }
        a { text-align: center; display: block; margin-top: 1rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>New Password</h1>
        {% if success %}
        <p class="success">Password updated! You can now login.</p>
        <a href="/login">Go to Login</a>
        {% elif expired %}
        <p class="error">Reset link expired. Please request a new one.</p>
        <a href="/forgot-password">Request New Link</a>
        {% else %}
        <form method="post" action="/reset-password">
            <input type="hidden" name="token" value="{{ token }}">
            <input type="password" name="password" placeholder="New Password" required>
            <input type="password" name="confirm" placeholder="Confirm Password" required>
            <button type="submit">Reset Password</button>
        </form>
        {% if error %}<p class="error">{{ error }}</p>{% endif %}
        {% endif %}
    </div>
</body>
</html>
