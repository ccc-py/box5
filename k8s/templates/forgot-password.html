<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - box5</title>
    <style>
        body { font-family: system-ui; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { width: 100%; max-width: 400px; padding: 2rem; }
        h1 { text-align: center; }
        form { display: flex; flex-direction: column; gap: 1rem; }
        input { padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px; font-size: 1rem; }
        button { padding: 0.75rem; background: #007bff; color: white; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; }
        .success { color: green; text-align: center; }
        .error { color: red; text-align: center; }
        a { text-align: center; display: block; margin-top: 1rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Reset Password</h1>
        {% if sent %}
        <p class="success">Email sent! Check your inbox for the reset link.</p>
        <a href="/login">Back to Login</a>
        {% else %}
        <form method="post" action="/forgot-password">
            <input type="email" name="email" placeholder="Email address" required>
            <input type="text" name="username" placeholder="Username" required>
            <button type="submit">Send Reset Link</button>
        </form>
        {% if error %}<p class="error">{{ error }}</p>{% endif %}
        <a href="/login">Back to Login</a>
        {% endif %}
    </div>
</body>
</html>
