<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ filename }} - box5</title>
    {% if base_path %}
    <base href="/raw{{ base_path }}/">
    {% endif %}
    <link rel="stylesheet" href="/static/box5.css">
    <style>
        body {
            font-family: system-ui, sans-serif;
            margin: 0;
            padding: 2rem;
            max-width: 900px;
            margin: 0 auto;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 1rem;
            color: #007bff;
            text-decoration: none;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .content {
            line-height: 1.6;
        }
        .content h1 { font-size: 2rem; margin-top: 1.5rem; }
        .content h2 { font-size: 1.5rem; margin-top: 1.25rem; }
        .content h3 { font-size: 1.25rem; margin-top: 1rem; }
        .content code {
            background: #f4f4f4;
            padding: 0.2rem 0.4rem;
            border-radius: 3px;
            font-family: monospace;
        }
        .content pre {
            background: #f4f4f4;
            padding: 1rem;
            overflow-x: auto;
            border-radius: 4px;
        }
        .content pre code {
            background: none;
            padding: 0;
        }
        .text-content {
            white-space: pre-wrap;
            background: #f8f9fa;
            padding: 1rem;
            border-radius: 4px;
            font-family: monospace;
        }
        .image-content {
            max-width: 100%;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <a href="/" class="back-link">Back to files</a>
    <h1>{{ filename }}</h1>
    {% if file_type == 'markdown' %}
    <div class="content">
        {{ content|safe }}
    </div>
    {% elif file_type == 'text' %}
    <pre class="text-content">{{ content }}</pre>
    {% elif file_type == 'image' %}
    <img src="/raw{{ filepath }}" alt="{{ filename }}" class="image-content">
    {% endif %}
</body>
</html>
