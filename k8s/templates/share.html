<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Share - Box5</title>
    <link rel="stylesheet" href="/static/box5.css">
    <style>
        body { font-family: system-ui; margin: 0; padding: 20px; background: #f5f5f5; display: flex; align-items: center; justify-content: center; }
        .container { max-width: 500px; width: 100%; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1 { margin-top: 0; color: #333; }
        .info { background: #f9f9f9; padding: 15px; border-radius: 4px; margin-bottom: 20px; }
        .info p { margin: 5px 0; color: #666; font-size: 14px; }
        .info .filepath { font-weight: bold; color: #333; font-size: 16px; word-break: break-all; }
        .error { background: #f8d7da; color: #721c24; padding: 15px; border-radius: 4px; }
        .password-form { margin-bottom: 20px; }
        .password-form input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; margin-bottom: 10px; }
        .password-form button { width: 100%; padding: 10px; background: #0066cc; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        .btn-download { display: block; width: 100%; padding: 12px; background: #28a745; color: white; text-align: center; text-decoration: none; border-radius: 4px; font-size: 16px; }
        .btn-download:hover { background: #218838; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 12px; background: #fff3cd; color: #856404; }
    </style>
</head>
<body>
    <div class="container">
        {% if error %}
            <div class="error"><h2>{{ error }}</h2></div>
        {% else %}
            <h1>Shared File</h1>
            <div class="info">
                <p class="filepath">{{ file_path }}</p>
                {% if expires_at %}
                    <p>Expires: {{ expires_at }}</p>
                {% endif %}
            </div>

            {% if has_password and not unlocked %}
                <form class="password-form" method="POST" action="/api/shares/{{ token }}/unlock">
                    <p>Enter password to access this file:</p>
                    <input type="password" name="password" placeholder="Password" required>
                    <button type="submit">Unlock</button>
                </form>
            {% elif unlocked %}
                <a class="btn-download" href="/api/shares/{{ token }}/download?password={{ password }}">Download File</a>
            {% else %}
                <a class="btn-download" href="/api/shares/{{ token }}/download">Download File</a>
            {% endif %}
        {% endif %}
    </div>
</body>
</html>
